name: Update Dashboard Data

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Snapshot quota data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p public/data

          # Rate limits
          gh api /rate_limit > public/data/rate_limit.json

          # User info
          gh api /user > public/data/user.json

          # Recent repos
          gh api "/users/uprootiny/repos?per_page=10&sort=updated" > public/data/repos.json

          # Actions billing (may fail on free plan)
          gh api /users/uprootiny/settings/billing/actions > public/data/actions.json 2>/dev/null || echo '{}' > public/data/actions.json

          # Packages billing
          gh api /users/uprootiny/settings/billing/packages > public/data/packages.json 2>/dev/null || echo '{}' > public/data/packages.json

          # Storage billing
          gh api /users/uprootiny/settings/billing/shared-storage > public/data/storage.json 2>/dev/null || echo '{}' > public/data/storage.json

          # Workflow runs across repos (last 10)
          gh api "/users/uprootiny/repos?per_page=10&sort=updated" --jq '.[].full_name' | while read repo; do
            slug=$(echo "$repo" | tr '/' '_')
            gh api "/repos/$repo/actions/runs?per_page=5" > "public/data/runs_${slug}.json" 2>/dev/null || true
          done

          # Timestamp
          echo "{\"updated\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > public/data/meta.json

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "chore: snapshot quota data $(date -u +%Y-%m-%d)"
          git push
