name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare static artifact
        run: |
          mkdir -p dist-pages/src dist-pages/tarot dist-pages/ops
          cp index.html dist-pages/index.html
          cp .nojekyll dist-pages/.nojekyll
          cp src/dashboard.js dist-pages/src/dashboard.js
          cp -R tarot/. dist-pages/tarot/
          cp -R ops/. dist-pages/ops/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages
      - uses: actions/deploy-pages@v4
        id: deployment
