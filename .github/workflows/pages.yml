name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare static artifact
        run: |
          mkdir -p dist-pages/src
          cp index.html dist-pages/index.html
          cp .nojekyll dist-pages/.nojekyll
          cp src/dashboard.js dist-pages/src/dashboard.js
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages
      - uses: actions/deploy-pages@v4
